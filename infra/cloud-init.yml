#cloud-config
package_update: true

packages:
  - docker.io
  - docker-compose-v2

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker azureuser

  # Create shared network for cross-compose communication
  - docker network create a11y-net

  # Pull and run sample app
  - docker pull ${docker_image}
  - docker run -d --name algobench --restart unless-stopped --network a11y-net -p 8080:8080 ${docker_image}

  # Set up monitoring stack
  - mkdir -p /opt/monitoring
  - |
    cat > /opt/monitoring/prometheus.yml <<'PROMEOF'
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'algobench'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['algobench:8080']
    PROMEOF
  - |
    cat > /opt/monitoring/docker-compose.yml <<'COMPEOF'
    services:
      prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        ports:
          - "9090:9090"
        volumes:
          - ./prometheus.yml:/etc/prometheus/prometheus.yml
          - prometheus-data:/prometheus
        command:
          - '--config.file=/etc/prometheus/prometheus.yml'
        networks:
          - a11y-net
        restart: unless-stopped
      grafana:
        image: grafana/grafana:latest
        container_name: grafana
        ports:
          - "3000:3000"
        environment:
          - GF_SECURITY_ADMIN_PASSWORD=admin
        volumes:
          - grafana-data:/var/lib/grafana
        networks:
          - a11y-net
        restart: unless-stopped
    networks:
      a11y-net:
        external: true
    volumes:
      prometheus-data:
      grafana-data:
    COMPEOF
  - cd /opt/monitoring && docker compose up -d
